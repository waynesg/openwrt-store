name: Build IPK

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package name (e.g., luci-app-autoupdate)'
        required: true
        type: string
      repo_url:
        description: 'GitHub repo URL (e.g., waynesg/luci-app-autoupdate)'
        required: true
        type: string
      branch:
        description: 'Branch or tag'
        required: false
        type: string
        default: 'main'
      target:
        description: 'Target (x86_64, aarch64)'
        required: false
        type: string
        default: 'x86_64'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Clone package source
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.repo_url }}
          ref: ${{ github.event.inputs.branch }}
          path: package

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache flex bison libssl-dev \
            libelf-dev autoconf automake libtool pkg-config zlib1g-dev \
            libncurses5-dev git curl wget gawk

      - name: Clone ImmortalWrt
        run: |
          git clone -b openwrt-24.10 --depth 1 \
            https://github.com/immortalwrt/immortalwrt.git ~/openwrt

      - name: Setup feeds
        run: |
          cd ~/openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy package
        run: |
          cd ~/openwrt
          PKG="${{ github.event.inputs.package }}"
          mkdir -p package/$PKG
          cp -r ${{ github.workspace }}/package/* package/$PKG/

      - name: Build
        run: |
          cd ~/openwrt
          make defconfig
          echo "CONFIG_PACKAGE_${{ github.event.inputs.package }}=y" >> .config
          make -j$(nproc) 2>&1 | tail -50 || true

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.package }}-${{ github.event.inputs.target }}
          path: ~/openwrt/bin/packages/**/${{ github.event.inputs.package }}*.ipk
          retention-days: 5
