name: Build IPK from Source

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package name (e.g., luci-app-autoupdate)'
        required: true
        type: string
      repo_url:
        description: 'Git repo URL (default: waynesg/openwrt-store)'
        required: false
        type: string
        default: ''
      branch:
        description: 'Branch or tag'
        required: false
        type: string
        default: 'main'
      profile:
        description: 'Target profile'
        required: false
        type: string
        default: 'x86_64'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.repo_url || 'waynesg/openwrt-store' }}
          ref: ${{ github.event.inputs.branch }}
          path: custom-package
          
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache flex bison libssl-dev \
            libelf-dev autoconf automake libtool pkg-config zlib1g-dev \
            libncurses5-dev git curl wget gawk

      - name: Clone ImmortalWrt
        run: |
          git clone -b openwrt-24.10 --depth 1 \
            https://github.com/immortalwrt/immortalwrt.git ~/openwrt

      - name: Setup feeds
        run: |
          cd ~/openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy custom package
        run: |
          cd ~/openwrt
          PKG_NAME="${{ github.event.inputs.package }}"
          cp -r ${{ github.workspace }}/custom-package/$PKG_NAME package/feeds/packages/$PKG_NAME || \
          mkdir -p package/$PKG_NAME && \
          cp -r ${{ github.workspace }}/custom-package/$PKG_NAME/* package/$PKG_NAME/

      - name: Build
        run: |
          cd ~/openwrt
          make defconfig
          # Enable the package in config
          echo "CONFIG_PACKAGE_${{ github.event.inputs.package }}=y" >> .config
          make ${{ github.event.inputs.profile }}/compile V=s -j$(nproc) || true

      - name: Find and upload IPK
        run: |
          find ~/openwrt/bin -name "*${{ github.event.inputs.package }}*.ipk" -type f

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.package }}-ipk
          path: ~/openwrt/bin/packages/**/${{ github.event.inputs.package }}*.ipk
